<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>骑手抢单</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .header .name { font-size: 18px; font-weight: 600; }
    .header button { padding: 8px 20px; background: #f56c6c; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .container { max-width: 900px; margin: 20px auto; padding: 0 16px; }
    .tabs { display: flex; gap: 0; margin-bottom: 20px; background: #fff; border-radius: 8px; overflow: hidden; }
    .tab { flex: 1; text-align: center; padding: 14px; cursor: pointer; font-size: 15px; color: #666; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab.active { color: #409eff; border-bottom-color: #409eff; font-weight: 600; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
    .order-row { display: flex; justify-content: space-between; align-items: center; }
    .order-info { flex: 1; }
    .order-info .no { font-size: 14px; color: #666; margin-bottom: 6px; }
    .order-info .addr { font-size: 16px; font-weight: 500; color: #303133; margin-bottom: 4px; }
    .order-info .meta { font-size: 13px; color: #999; }
    .order-action { margin-left: 20px; }
    .order-action button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; color: #fff; transition: opacity .2s; }
    .btn-grab { background: #e6a23c; }
    .btn-grab:hover { opacity: .85; }
    .btn-done { background: #67c23a; }
    .btn-done:hover { opacity: .85; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
    .tag-delivering { background: #ecf5ff; color: #409eff; }
    .tag-done { background: #f0f9eb; color: #67c23a; }
    .amount { font-size: 18px; font-weight: 700; color: #f56c6c; }
    .empty { text-align: center; padding: 60px; color: #999; font-size: 15px; }
    .loading-text { text-align: center; padding: 20px; color: #999; }
    .refresh { text-align: right; margin-bottom: 12px; }
    .refresh button { padding: 6px 16px; background: #fff; border: 1px solid #dcdfe6; border-radius: 6px; cursor: pointer; font-size: 13px; color: #666; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="name">🚀 {{ riderName }}</span>
    <button @click="logout">退出</button>
  </div>
  <div class="container">
    <div class="tabs">
      <div class="tab" :class="{ active: tab === 'pending' }" @click="tab = 'pending'; fetchPending()">待抢订单</div>
      <div class="tab" :class="{ active: tab === 'my' }" @click="tab = 'my'; fetchMy()">我的订单</div>
    </div>

    <!-- 待抢 -->
    <div v-show="tab === 'pending'">
      <div class="refresh"><button @click="fetchPending">刷新</button></div>
      <div v-if="pendingOrders.length === 0 && !loadingPending" class="empty">暂无待派送订单</div>
      <div v-for="o in pendingOrders" :key="o.id" class="card">
        <div class="order-row">
          <div class="order-info">
            <div class="no">#{{ o.number }}</div>
            <div class="addr">{{ o.address }}</div>
            <div class="meta">{{ o.consignee }} · {{ o.phone }}</div>
          </div>
          <div class="amount">¥{{ o.amount.toFixed(2) }}</div>
          <div class="order-action">
            <button class="btn-grab" @click="grab(o.id)">抢单</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 我的 -->
    <div v-show="tab === 'my'">
      <div v-if="myOrders.length === 0 && !loadingMy" class="empty">还没有抢到订单</div>
      <div v-for="o in myOrders" :key="o.id" class="card">
        <div class="order-row">
          <div class="order-info">
            <div class="no">#{{ o.number }} <span :class="o.status === 4 ? 'tag tag-delivering' : 'tag tag-done'">{{ o.status === 4 ? '配送中' : '已完成' }}</span></div>
            <div class="addr">{{ o.address }}</div>
            <div class="meta">{{ o.consignee }} · {{ o.phone }}</div>
          </div>
          <div class="amount">¥{{ o.amount.toFixed(2) }}</div>
          <div class="order-action">
            <button v-if="o.status === 4" class="btn-done" @click="complete(o.id)">送达</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    tab: 'pending',
    riderName: '',
    pendingOrders: [],
    myOrders: [],
    loadingPending: false,
    loadingMy: false
  },
  created() {
    var info = localStorage.getItem('rider_info')
    if (!info) { location.href = 'login.html'; return }
    this.riderName = JSON.parse(info).name
    this.fetchPending()
    // 每10秒自动刷新待抢单
    setInterval(() => { if (this.tab === 'pending') this.fetchPending() }, 10000)
  },
  methods: {
    token() { return localStorage.getItem('rider_token') || '' },
    async fetchPending() {
      this.loadingPending = true
      try {
        var res = await axios.get('http://localhost:8080/rider/orders/pending', { headers: { token: this.token() } })
        if (res.data.code === 1) this.pendingOrders = res.data.data || []
      } catch (e) { console.error(e) }
      finally { this.loadingPending = false }
    },
    async fetchMy() {
      this.loadingMy = true
      try {
        var res = await axios.get('http://localhost:8080/rider/orders/my', { headers: { token: this.token() } })
        if (res.data.code === 1) this.myOrders = res.data.data || []
      } catch (e) { console.error(e) }
      finally { this.loadingMy = false }
    },
    async grab(id) {
      try {
        var res = await axios.get('http://localhost:8080/rider/orders/grab?id=' + id, { headers: { token: this.token() } })
        if (res.data.code === 1) {
          alert('抢单成功！')
          this.fetchPending()
          this.fetchMy()
        } else {
          alert(res.data.msg)
          this.fetchPending()
        }
      } catch (e) { alert('抢单失败') }
    },
    async complete(id) {
      try {
        var res = await axios.get('http://localhost:8080/rider/orders/complete?id=' + id, { headers: { token: this.token() } })
        if (res.data.code === 1) {
          alert('已送达')
          this.fetchMy()
        } else {
          alert(res.data.msg)
        }
      } catch (e) { alert('操作失败') }
    },
    logout() {
      localStorage.removeItem('rider_token')
      localStorage.removeItem('rider_info')
      location.href = 'login.html'
    }
  }
})
</script>
</body>
</html>
