<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>骑手登录</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { width: 380px; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .card h2 { text-align: center; margin-bottom: 30px; color: #303133; font-size: 24px; }
    .card input { width: 100%; padding: 12px 16px; border: 1px solid #dcdfe6; border-radius: 8px; font-size: 16px; outline: none; transition: border .3s; }
    .card input:focus { border-color: #409eff; }
    .card button { width: 100%; padding: 12px; background: #409eff; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 16px; transition: background .3s; }
    .card button:hover { background: #337ecc; }
    .card button:disabled { background: #a0cfff; cursor: not-allowed; }
    .tip { text-align: center; color: #999; font-size: 13px; margin-top: 20px; }
    .error { color: #f56c6c; text-align: center; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
<div id="app">
  <div class="card">
    <h2>🚀 骑手登录</h2>
    <input v-model="phone" type="text" placeholder="请输入手机号" @keyup.enter="login">
    <button @click="login" :disabled="loading">{{ loading ? '登录中...' : '登录' }}</button>
    <div v-if="errMsg" class="error">{{ errMsg }}</div>
    <div class="tip">测试骑手：13800000001 ~ 13800000005</div>
  </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
new Vue({
  el: '#app',
  data: { phone: '', loading: false, errMsg: '' },
  methods: {
    async login() {
      if (!this.phone) { this.errMsg = '请输入手机号'; return }
      this.loading = true; this.errMsg = ''
      try {
        const res = await axios.post('http://localhost:8080/rider/login', { phone: this.phone })
        if (res.data.code === 1) {
          localStorage.setItem('rider_token', res.data.data.token)
          localStorage.setItem('rider_info', JSON.stringify(res.data.data))
          location.href = 'orders.html'
        } else {
          this.errMsg = res.data.msg
        }
      } catch (e) { this.errMsg = '登录失败，请检查服务是否启动' }
      finally { this.loading = false }
    }
  }
})
</script>
</body>
</html>
